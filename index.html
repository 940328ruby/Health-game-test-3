<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大學生外食生存戰：我的餐盤任務</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Noto Sans TC", Arial, sans-serif;
  background: linear-gradient(135deg, #dbeafe, #dcfce7, #fef9c3);
  color: #1f2937;
}
.screen {
  min-height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.active { display: flex; }
.card, .panel {
  background: rgba(255,255,255,.96);
  border-radius: 28px;
  padding: 26px;
  box-shadow: 0 14px 38px rgba(15,23,42,.14);
}
.card { width: min(980px, 100%); text-align: center; }
h1 { font-size: 42px; margin: 8px 0; }
h2 { margin: 6px 0 14px; }
p { font-size: 18px; line-height: 1.75; }
button {
  border: 0;
  border-radius: 16px;
  padding: 12px 22px;
  margin: 8px;
  font-size: 18px;
  cursor: pointer;
  background: #38bdf8;
  color: white;
  font-weight: 900;
}
button:hover { background: #0284c7; }
button.secondary { background: #94a3b8; }
button.success { background: #22c55e; }
button.danger { background: #ef4444; }
button:disabled { background: #cbd5e1; cursor: not-allowed; }
#gameScreen { align-items: flex-start; padding: 18px; }
.status-row {
  width: min(1380px, 100%);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 0 auto 16px;
}
.status-box {
  background: rgba(255,255,255,.96);
  border-radius: 20px;
  padding: 12px;
  text-align: center;
  font-weight: 900;
  box-shadow: 0 8px 20px rgba(15,23,42,.1);
}
.status-box strong { color: #0369a1; font-size: 24px; }
.game-frame {
  width: min(1380px, 100%);
  margin: auto;
  display: grid;
  grid-template-columns: 1.05fr 1.2fr .95fr;
  gap: 18px;
}
.wheel-wrap { display: flex; flex-direction: column; align-items: center; }
.pointer {
  width: 0; height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 34px solid #ef4444;
  margin-bottom: -6px;
  z-index: 2;
}
#wheel {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  border: 10px solid white;
  background: conic-gradient(#bae6fd 0 45deg,#bbf7d0 45deg 90deg,#fde68a 90deg 135deg,#fecaca 135deg 180deg,#ddd6fe 180deg 225deg,#fed7aa 225deg 270deg,#ccfbf1 270deg 315deg,#fbcfe8 315deg 360deg);
  box-shadow: 0 14px 35px rgba(15,23,42,.2);
  position: relative;
  transition: transform 2s cubic-bezier(.18,.89,.32,1.28);
}
#wheel::after {
  content: "任務轉盤";
  position: absolute;
  inset: 72px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-weight: 900;
  color: #0369a1;
  font-size: 24px;
  box-shadow: inset 0 0 0 5px #e0f2fe;
}
.case-tag {
  display: inline-block;
  background: #e0f2fe;
  color: #0369a1;
  border-radius: 999px;
  padding: 8px 14px;
  font-weight: 900;
  margin-top: 12px;
}
.mission-box {
  background: #f8fafc;
  border: 2px dashed #bae6fd;
  border-radius: 18px;
  padding: 14px;
  line-height: 1.75;
}
.mission-box strong { color: #0f766e; }
.plate {
  min-height: 430px;
  border-radius: 34px;
  background: radial-gradient(circle at center, #fff 0 38%, #e0f2fe 39% 46%, #fff 47% 100%);
  border: 8px solid #bae6fd;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 20px;
  align-content: start;
}
.empty-note {
  grid-column: 1 / -1;
  align-self: center;
  justify-self: center;
  text-align: center;
  color: #64748b;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.8;
}
.food-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  max-height: 650px;
  overflow: auto;
  padding-right: 4px;
}
.food-card {
  border: 3px solid #e2e8f0;
  background: white;
  border-radius: 20px;
  padding: 12px;
  cursor: grab;
  user-select: none;
  box-shadow: 0 7px 18px rgba(15,23,42,.08);
  transition: transform .15s, border-color .15s;
}
.food-card:hover { transform: translateY(-3px); border-color: #38bdf8; }
.food-card.selected { border-color: #22c55e; background: #f0fdf4; cursor: pointer; }
.food-emoji { font-size: 30px; display: block; }
.food-name { font-weight: 900; margin-top: 4px; }
.food-meta { font-size: 13px; color: #64748b; margin-top: 4px; line-height: 1.4; }
.action-row { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
.info-box {
  background: #f8fafc;
  border-radius: 18px;
  padding: 14px;
  line-height: 1.75;
  border: 2px dashed #cbd5e1;
  margin-bottom: 12px;
}
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.55);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
}
.modal-backdrop.show { display: flex; }
.modal {
  width: min(780px, 100%);
  background: white;
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(15,23,42,.35);
}
.modal h2 { text-align: center; font-size: 34px; }
.big-score { text-align: center; font-size: 44px; font-weight: 900; color: #0369a1; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.result-box { background: #f8fafc; border-radius: 18px; padding: 14px; line-height: 1.7; }
.good { color: #16a34a; font-weight: 900; }
.bad { color: #dc2626; font-weight: 900; }
.review-list { text-align: left; max-height: 48vh; overflow: auto; background: white; padding: 18px; border-radius: 20px; }
.review-item { padding: 12px; border-bottom: 1px solid #e5e7eb; line-height: 1.7; }
@media (max-width: 1100px) {
  .game-frame { grid-template-columns: 1fr; }
  .status-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  h1 { font-size: 32px; }
  .food-grid, .plate, .result-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<section id="homeScreen" class="screen active">
  <div class="card">
    <h1>大學生外食生存戰</h1>
    <h2>我的餐盤任務</h2>
    <p>
      你將扮演校園健康飲食顧問，透過任務轉盤抽出不同大學生個案。<br>
      可能遇到熬夜趕報告、健身後補充蛋白質、預算只有 100 元、愛喝手搖飲、早上睡過頭等情境。<br>
      請依照個案需求，拖曳或點選食物卡片放進餐盤，送出後系統會給予分數、營養分析與衛教提醒。
    </p>
    <button onclick="startGame()">開始任務</button>
  </div>
</section>

<section id="gameScreen" class="screen">
  <div style="width:100%;">
    <div class="status-row">
      <div class="status-box">任務<br><strong id="missionNumber">1</strong> / <strong id="missionTotal">5</strong></div>
      <div class="status-box">總分<br><strong id="totalScore">0</strong></div>
      <div class="status-box">本餐預算<br><strong id="budgetText">--</strong></div>
      <div class="status-box">已選金額<br><strong id="costText">0</strong></div>
    </div>
    <div class="game-frame">
      <aside class="panel">
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <div id="wheel"></div>
          <button id="spinBtn" onclick="spinWheel()">轉出這次個案</button>
        </div>
        <div id="caseInfo" style="display:none;">
          <div class="case-tag" id="caseTag">任務 1</div>
          <h2 id="caseTitle"></h2>
          <div class="mission-box">
            <p id="caseStory"></p>
            <p><strong>任務目標：</strong><span id="caseGoal"></span></p>
            <p><strong>限制條件：</strong><span id="caseLimit"></span></p>
          </div>
        </div>
      </aside>
      <main class="panel">
        <h2>我的餐盤</h2>
        <div id="plate" class="plate" ondragover="event.preventDefault()" ondrop="dropToPlate(event)"></div>
        <div class="action-row">
          <button class="success" onclick="submitPlate()">送出餐盤</button>
          <button class="secondary" onclick="clearPlate()">清空餐盤</button>
          <button class="danger" onclick="endGame()">結束遊戲</button>
        </div>
      </main>
      <aside class="panel">
        <h2>食物卡片區</h2>
        <div class="info-box">請依照個案任務，選擇 3 到 5 張食物卡片。可以拖曳，也可以直接點擊卡片加入餐盤。</div>
        <div id="foodGrid" class="food-grid"></div>
      </aside>
    </div>
  </div>
</section>

<section id="endScreen" class="screen">
  <div class="card">
    <h1>任務完成！</h1>
    <h2 id="finalScore"></h2>
    <p id="finalComment"></p>
    <h2>任務回顧</h2>
    <div id="reviewList" class="review-list"></div>
    <button onclick="startGame()">再玩一次</button>
    <button onclick="showScreen('homeScreen')">回首頁</button>
  </div>
</section>

<div id="resultModal" class="modal-backdrop">
  <div class="modal">
    <h2 id="modalTitle">任務結果</h2>
    <div class="big-score" id="modalScore">0 分</div>
    <div class="result-grid">
      <div class="result-box"><h3>營養分析</h3><div id="nutritionAnalysis"></div></div>
      <div class="result-box"><h3>衛教提醒</h3><div id="educationTip"></div></div>
    </div>
    <div class="result-box" style="margin-top:12px;"><h3>本次選擇</h3><div id="selectedSummary"></div></div>
    <div style="text-align:center; margin-top:18px;"><button onclick="nextMission()">進入下一個任務</button></div>
  </div>
</div>

<script>
const TOTAL_MISSIONS = 5;
const foods = [
  f("riceball", "🍙", "鮭魚飯糰", 38, ["grain", "protein"], "有主食與部分蛋白質，但蔬菜不足。"),
  f("sweetpotato", "🍠", "烤地瓜", 35, ["grain", "fiber"], "全穀雜糧類替代選擇，纖維較佳。"),
  f("egg", "🥚", "茶葉蛋", 15, ["protein"], "便利取得的平價蛋白質來源。"),
  f("tofu", "⬜", "涼拌豆腐", 45, ["protein"], "豆製品可提供蛋白質，油脂通常較低。"),
  f("chicken", "🍗", "舒肥雞胸", 65, ["protein"], "蛋白質含量較高，適合健身後補充。"),
  f("friedchicken", "🍖", "炸雞排", 85, ["protein", "fried"], "有蛋白質，但油脂較高。"),
  f("salad", "🥗", "生菜沙拉", 55, ["vegetable", "fiber"], "能補充蔬菜與纖維，醬料可減量。"),
  f("veg", "🥬", "燙青菜", 40, ["vegetable", "fiber"], "增加蔬菜攝取，適合搭配外食。"),
  f("fruit", "🍎", "當季水果", 35, ["fruit", "fiber"], "原型水果比果汁更有飽足感與纖維。"),
  f("milk", "🥛", "低脂鮮奶", 35, ["dairy", "protein"], "可補充鈣質與蛋白質。"),
  f("soy", "🧃", "無糖豆漿", 30, ["protein", "noSugarDrink"], "可補充蛋白質，也比含糖飲更適合。"),
  f("water", "💧", "白開水", 0, ["noSugarDrink"], "不含糖，是最基本的補水選擇。"),
  f("tea", "🍵", "無糖茶", 25, ["noSugarDrink"], "比含糖飲料更適合作為日常飲品。"),
  f("bubbletea", "🧋", "全糖珍奶", 65, ["sugaryDrink"], "糖與熱量較高，建議降低糖度或頻率。"),
  f("soda", "🥤", "含糖汽水", 30, ["sugaryDrink"], "容易增加添加糖攝取。"),
  f("noodles", "🍜", "泡麵", 55, ["grain", "highSodium"], "方便但鈉含量通常偏高。"),
  f("chips", "🍟", "洋芋片", 35, ["snack", "highSodium"], "高油高鈉零食，不適合作為正餐主體。"),
  f("donut", "🍩", "甜甜圈", 40, ["sugar", "snack"], "糖與油脂較高，營養密度較不足。"),
  f("nuts", "🥜", "無調味堅果", 30, ["nuts"], "有好油脂與營養，但份量不宜過多。")
];
const cases = [
  c("熬夜趕報告的大學生", "期末報告今晚截止，小安晚餐只能快速解決，但希望不要只靠甜食撐精神。", "組合一份有主食、蛋白質、蔬菜，且飲料不含糖的晚餐。", 140, ["grain", "protein", "vegetable", "noSugarDrink"], ["sugaryDrink", "snack"], "熬夜時容易想靠糖分提神，但含糖飲料可能讓糖攝取過量。建議選擇均衡餐點搭配無糖飲品。"),
  c("健身後想補充蛋白質", "阿哲剛做完重量訓練，想補充蛋白質，也希望不要只吃肉而忽略蔬菜和主食。", "選出含蛋白質、主食與蔬菜的組合，避免只靠炸物補充蛋白質。", 170, ["protein", "grain", "vegetable"], ["fried", "sugaryDrink"], "運動後可補充蛋白質與適量碳水化合物，但油炸食品不是最理想的主要來源。"),
  c("預算只有 100 元的大學生", "小宏今天生活費只剩 100 元，但仍想吃得有飽足感，不希望只買零食果腹。", "在 100 元內搭配出有主食與蛋白質的餐點，若能加入蔬菜更好。", 100, ["grain", "protein"], ["snack", "sugaryDrink"], "健康飲食不一定昂貴，可用地瓜、茶葉蛋、無糖豆漿等平價食物組合出較好的選擇。"),
  c("愛喝手搖飲的大學生", "小杰每天都喝全糖飲料，最近想開始減糖，但覺得完全不喝很難。", "選擇無糖飲品，並搭配一份較均衡的點心或餐點。", 130, ["noSugarDrink", "protein"], ["sugaryDrink", "sugar"], "減糖可以從飲料開始，先改無糖、微糖或降低頻率，比一開始就完全禁止更可持續。"),
  c("忙到只能買便利商店晚餐", "怡君晚上要補習又要開會，只能去便利商店買晚餐。她想吃得方便，但不要只有泡麵和飲料。", "組合出包含主食、蛋白質、蔬菜與無糖飲品的一餐。", 180, ["grain", "protein", "vegetable", "noSugarDrink"], ["highSodium", "sugaryDrink"], "便利商店也可以搭配出較均衡的一餐，重點是避免泡麵、零食與含糖飲料成為主體。"),
  c("早上睡過頭的大學生", "小萱早八睡過頭，只剩 10 分鐘買早餐。她想要快速、有飽足感，也希望上午上課有精神。", "選擇快速取得、含主食與蛋白質的早餐，飲品以無糖為主。", 120, ["grain", "protein", "noSugarDrink"], ["sugaryDrink", "sugar"], "早餐可從主食、蛋白質與無糖飲品開始搭配，避免只有含糖飲料或甜點。")
];
function f(id, emoji, name, price, tags, note) { return { id, emoji, name, price, tags, note }; }
function c(title, story, goal, budget, required, avoid, tip) { return { title, story, goal, budget, required, avoid, tip }; }
let currentMission = 0, totalScore = 0, currentCase = null, selectedFoods = [], usedCases = [], history = [], wheelRotation = 0;
const plate = document.getElementById("plate");
const foodGrid = document.getElementById("foodGrid");
function showScreen(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
function startGame() {
  currentMission = 1; totalScore = 0; currentCase = null; selectedFoods = []; usedCases = []; history = []; wheelRotation = 0;
  document.getElementById("wheel").style.transform = "rotate(0deg)";
  document.getElementById("missionTotal").textContent = TOTAL_MISSIONS;
  document.getElementById("caseInfo").style.display = "none";
  renderFoods(); clearPlate(); updateStatus(); showScreen("gameScreen");
}
function updateStatus() {
  document.getElementById("missionNumber").textContent = currentMission;
  document.getElementById("totalScore").textContent = totalScore;
  document.getElementById("budgetText").textContent = currentCase ? currentCase.budget + " 元" : "--";
  document.getElementById("costText").textContent = selectedFoods.reduce((s, f) => s + f.price, 0) + " 元";
}
function spinWheel() {
  const btn = document.getElementById("spinBtn"); btn.disabled = true;
  wheelRotation += 1080 + Math.floor(Math.random() * 360);
  document.getElementById("wheel").style.transform = "rotate(" + wheelRotation + "deg)";
  setTimeout(() => { chooseCase(); btn.disabled = false; }, 2100);
}
function chooseCase() {
  const pool = cases.filter((_, i) => !usedCases.includes(i));
  const source = pool.length ? pool : cases;
  currentCase = source[Math.floor(Math.random() * source.length)];
  usedCases.push(cases.indexOf(currentCase));
  selectedFoods = [];
  document.getElementById("caseInfo").style.display = "block";
  document.getElementById("caseTag").textContent = "任務 " + currentMission;
  document.getElementById("caseTitle").textContent = currentCase.title;
  document.getElementById("caseStory").textContent = currentCase.story;
  document.getElementById("caseGoal").textContent = currentCase.goal;
  document.getElementById("caseLimit").textContent = "預算 " + currentCase.budget + " 元，建議選擇 3 到 5 樣食物。";
  clearPlate(); updateStatus();
}
function renderFoods() { foodGrid.innerHTML = foods.map(item => foodCard(item)).join(""); }
function foodCard(item) {
  return '<div class="food-card" draggable="true" ondragstart="dragFood(event,\'' + item.id + '\')" onclick="addFoodById(\'' + item.id + '\')"><span class="food-emoji">' + item.emoji + '</span><div class="food-name">' + item.name + '</div><div class="food-meta">' + item.price + ' 元｜' + item.note + '</div></div>';
}
function dragFood(event, id) { event.dataTransfer.setData("foodId", id); }
function dropToPlate(event) { event.preventDefault(); addFoodById(event.dataTransfer.getData("foodId")); }
function addFoodById(id) {
  if (!currentCase) { alert("請先轉出這次的個案任務！"); return; }
  if (selectedFoods.length >= 5) { alert("餐盤最多選擇 5 樣食物喔！"); return; }
  const item = foods.find(food => food.id === id); if (!item) return;
  selectedFoods.push(item); renderPlate(); updateStatus();
}
function removeFood(index) { selectedFoods.splice(index, 1); renderPlate(); updateStatus(); }
function renderPlate() {
  if (selectedFoods.length === 0) {
    plate.innerHTML = '<div class="empty-note">把食物卡片拖曳到餐盤中<br>或點擊卡片加入餐盤</div>'; return;
  }
  plate.innerHTML = selectedFoods.map((item, index) => '<div class="food-card selected" onclick="removeFood(' + index + ')"><span class="food-emoji">' + item.emoji + '</span><div class="food-name">' + item.name + '</div><div class="food-meta">' + item.price + ' 元｜點擊可移除</div></div>').join("");
}
function clearPlate() { selectedFoods = []; renderPlate(); updateStatus(); }
function submitPlate() {
  if (!currentCase) { alert("請先轉出這次的個案任務！"); return; }
  if (selectedFoods.length < 3) { alert("請至少選擇 3 樣食物，餐盤才比較完整喔！"); return; }
  const result = evaluatePlate(); totalScore += result.score;
  history.push({ mission: currentMission, title: currentCase.title, score: result.score, selected: selectedFoods.map(f => f.name).join("、"), analysis: result.analysis.join("<br>"), tip: currentCase.tip });
  showResultModal(result); updateStatus();
}
function evaluatePlate() {
  const tags = selectedFoods.flatMap(f => f.tags); const cost = selectedFoods.reduce((s, f) => s + f.price, 0);
  let score = 40; const analysis = [];
  currentCase.required.forEach(tag => { if (tags.includes(tag)) { score += 10; analysis.push('<span class="good">✓ 達成：</span>' + tagText(tag)); } else { score -= 8; analysis.push('<span class="bad">✗ 缺少：</span>' + tagText(tag)); } });
  currentCase.avoid.forEach(tag => { if (tags.includes(tag)) { score -= 8; analysis.push('<span class="bad">△ 需要留意：</span>包含 ' + tagText(tag)); } });
  if (cost <= currentCase.budget) { score += 10; analysis.push('<span class="good">✓ 符合預算：</span>' + cost + ' 元 / ' + currentCase.budget + ' 元'); } else { score -= 10; analysis.push('<span class="bad">✗ 超出預算：</span>' + cost + ' 元 / ' + currentCase.budget + ' 元'); }
  if (tags.includes("vegetable") && tags.includes("protein") && tags.includes("grain")) { score += 10; analysis.push('<span class="good">✓ 結構完整：</span>包含主食、蛋白質與蔬菜'); }
  if (tags.includes("sugaryDrink") && !tags.includes("noSugarDrink")) { score -= 10; analysis.push('<span class="bad">✗ 飲品可改善：</span>可改成白開水、無糖茶或無糖豆漿'); }
  score = Math.max(0, Math.min(100, score));
  const level = score >= 85 ? "健康顧問高手" : score >= 70 ? "外食搭配達人" : score >= 55 ? "還可以再調整" : "需要重新檢視餐盤";
  return { score, level, analysis, cost };
}
function tagText(tag) {
  const map = { grain:"主食 / 全穀雜糧", protein:"蛋白質", vegetable:"蔬菜", fruit:"水果", dairy:"乳品", fiber:"膳食纖維", nuts:"堅果種子", noSugarDrink:"無糖飲品", sugaryDrink:"含糖飲料", snack:"高糖高油零食", highSodium:"高鈉食品", highFat:"高油脂食品", fried:"油炸食品", sugar:"高糖食物" };
  return map[tag] || tag;
}
function showResultModal(result) {
  document.getElementById("modalTitle").textContent = result.level;
  document.getElementById("modalScore").textContent = result.score + " 分";
  document.getElementById("nutritionAnalysis").innerHTML = result.analysis.join("<br>");
  document.getElementById("educationTip").innerHTML = currentCase.tip;
  document.getElementById("selectedSummary").innerHTML = "<strong>你選擇了：</strong>" + selectedFoods.map(f => f.name).join("、") + "<br><strong>總金額：</strong>" + result.cost + " 元<br><strong>建議：</strong>思考這份餐盤是否符合個案的預算、時間、營養需求與長期可執行性。";
  document.getElementById("resultModal").classList.add("show");
}
function nextMission() {
  document.getElementById("resultModal").classList.remove("show");
  if (currentMission >= TOTAL_MISSIONS) { endGame(); return; }
  currentMission++; currentCase = null; selectedFoods = []; clearPlate();
  document.getElementById("caseInfo").style.display = "none"; updateStatus();
}
function endGame() {
  document.getElementById("resultModal").classList.remove("show"); showScreen("endScreen");
  document.getElementById("finalScore").textContent = "總分：" + totalScore + " / " + (TOTAL_MISSIONS * 100);
  const avg = totalScore / TOTAL_MISSIONS;
  document.getElementById("finalComment").textContent = avg >= 85 ? "太棒了！你很能把飲食知識轉化成生活化的衛教建議。" : avg >= 70 ? "表現不錯！多數情境都能做出合理的餐盤搭配。" : avg >= 55 ? "已有基本概念，但可以再加強預算、飲品與蔬菜搭配。" : "建議回顧任務分析，重新練習如何根據個案需求設計餐盤。";
  renderReview();
}
function renderReview() {
  const list = document.getElementById("reviewList");
  if (history.length === 0) { list.innerHTML = "<p>尚未完成任務。</p>"; return; }
  list.innerHTML = history.map(item => '<div class="review-item"><strong>任務 ' + item.mission + '｜' + item.title + '</strong><br><strong>得分：</strong>' + item.score + ' 分<br><strong>你的餐盤：</strong>' + item.selected + '<br><strong>分析：</strong><br>' + item.analysis + '<br><strong>衛教提醒：</strong>' + item.tip + '</div>').join("");
}
</script>
